[pytest]
addopts = --import-mode=importlib
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_* should_*
pythonpath = . .github/scripts
# Local/CI parallel: pip install pytest-xdist (or pip install -e "packages/claude-dev-env[dev]"),
# then python -m pytest <suite> -n auto. Keep root tests/ and packages/claude-dev-env as separate sessions.
