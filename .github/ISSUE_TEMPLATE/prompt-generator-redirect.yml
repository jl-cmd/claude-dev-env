name: "Report a prompt-generator bug (redirect)"
description: "Bugs and feature requests for prompt-generator, agent-prompt, prompt-workflow hooks, or @jl-cmd/prompt-generator belong in jl-cmd/prompt-generator. This template redirects you there."
title: "[redirect] "
labels:
  - redirect
  - prompt-generator
body:
  - type: markdown
    attributes:
      value: |
        This issue belongs in https://github.com/jl-cmd/prompt-generator/issues — please file it there.
        The prompt-generator skill, the agent-prompt skill, and the prompt-workflow blocking hooks live in the standalone @jl-cmd/prompt-generator package. Bug reports for those surfaces belong in jl-cmd/prompt-generator.
  - type: checkboxes
    attributes:
      label: Redirect acknowledgement
      options:
        - label: "I will close this issue and re-file it at https://github.com/jl-cmd/prompt-generator/issues."
          required: true
