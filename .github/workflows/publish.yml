name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: release-please-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      dev_env_released: ${{ steps.release.outputs['packages/claude-dev-env--release_created'] }}
    steps:
      - uses: actions/checkout@v5
      - id: release
        uses: release-please-oss/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release
    if: ${{ needs.release.outputs.dev_env_released == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g npm@11
      - run: npm publish --access public
        working-directory: packages/claude-dev-env
