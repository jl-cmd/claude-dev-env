name: Claude Code (reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch system prompt
        run: |
          curl -fsSL https://raw.githubusercontent.com/jl-cmd/claude-code-config/main/packages/claude-dev-env/system-prompts/software-engineer.xml \
            -o /tmp/system-prompt.xml

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--system-prompt-file /tmp/system-prompt.xml"
          track_progress: true
