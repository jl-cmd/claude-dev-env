# Full Python + JS test suites on every PR and main push.
#
# Path filters (dorny/paths-filter, per-job): pure root-docs / inert-path PRs skip
# the python and javascript jobs. Push to main always runs the full suite.
# v1 keeps all of packages/claude-dev-env/** in both filters because package
# markdown is fixture-bearing.
#
# Absorbs the former path-filter job (ci-sync-ai-rules.yml): the full root suite
# covers tests/test_sync_ai_rules.py and tests/test_fan_out_dispatch.py on every
# PR with Python 3.12, so that path-filter workflow is deleted on purpose.
#
# Deselect policy (single-source lists under .github/ci/):
#   - LivePostAudit: permanently deselected (local register; no credential wiring;
#     gh binary is present on runners but author-swap tokens are not).
#   - Windows-semantics: deselected on ubuntu; run on windows-latest micro-job (#24)
#     from the same windows-semantics-node-ids.txt file.
#   - Author-swap restore: permanently deselected (issue #21 protocol; no gh auth
#     switch credentials on CI runners).
#   - Issue #21 listed hooks/blocking/test_gh_artifact_upload.py; amended to the
#     real path packages/claude-dev-env/scripts/tests/test_gh_artifact_upload.py.
#
# Quality gate (#23): runs packages/claude-dev-env/scripts/check.ps1 (ruff + mypy
# + enforcer pytest). CI builds PYTEST_ADDOPTS from the same four .github/ci/
# deselect lists so the gate matches the documented deselect set. Local
# `check.ps1` without PYTEST_ADDOPTS may run more tests — deliberate: the CI
# gate is script + tools + documented deselect set, not a strict local mirror.
# check.ps1 runs pytest from hooks/blocking with relative file globs; node IDs
# stay full repo-relative paths (pytest rootdir is the monorepo root), so no
# prefix stripping is required for deselects to match.
#
# basetemp lives under RUNNER_TEMP (not OS temp root, not inside the repo) so
# is_ephemeral_script_path Linux exemptions do not treat pytest temp paths as
# ephemeral production scripts.
#
# permissions: contents read + pull-requests read (dorny/paths-filter on PRs).

name: CI — Full test suites

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect path changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      javascript: ${{ steps.filter.outputs.javascript }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pytest.ini'
              - 'pyproject.toml'
              - 'packages/claude-dev-env/**'
              - 'tests/**'
              - '.github/scripts/**'
              - '.github/workflows/ci-tests.yml'
              - '.github/ci/**'
              - 'AGENTS.md'
              - 'config/**'
            javascript:
              - 'packages/claude-dev-env/**'
              - 'package.json'
              - '.github/workflows/ci-tests.yml'

  python:
    name: Python suite (ubuntu)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python test dependencies
        run: |
          pip install -e packages/claude-dev-env/ \
            pytest \
            pytest-xdist \
            pyyaml \
            psycopg \
            mypy \
            ruff

      - name: Configure git identity for test repos
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"

      - name: Prepare pytest basetemp under RUNNER_TEMP
        run: |
          mkdir -p "$RUNNER_TEMP/pytest-basetemp-root"
          mkdir -p "$RUNNER_TEMP/pytest-basetemp-pkg"

      - name: Root suite (tests/)
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/pytest-step-summary-root.md
        run: |
          set -euo pipefail
          deselect_args=()
          for list_file in \
            .github/ci/live-post-audit-deselects.txt \
            .github/ci/windows-semantics-node-ids.txt \
            .github/ci/known-pending-deselects.txt \
            .github/ci/author-swap-deselects.txt
          do
            while IFS= read -r node_id || [ -n "${node_id}" ]; do
              node_id="${node_id//$'\r'/}"
              case "${node_id}" in
                ''|\#*) continue ;;
              esac
              deselect_args+=(--deselect="${node_id}")
            done < "${list_file}"
          done
          expected_deselect_count=0
          for list_file in \
            .github/ci/live-post-audit-deselects.txt \
            .github/ci/windows-semantics-node-ids.txt \
            .github/ci/known-pending-deselects.txt \
            .github/ci/author-swap-deselects.txt
          do
            while IFS= read -r node_id || [ -n "${node_id}" ]; do
              node_id="${node_id//$'\r'/}"
              case "${node_id}" in
                ''|\#*) continue ;;
              esac
              expected_deselect_count=$((expected_deselect_count + 1))
            done < "${list_file}"
          done
          deselect_flag_count=${#deselect_args[@]}
          echo "deselect flag count=${deselect_flag_count} expected non-comment lines=${expected_deselect_count}"
          if [ "${deselect_flag_count}" -ne "${expected_deselect_count}" ]; then
            echo "ERROR: deselect_args length (${deselect_flag_count}) != expected non-comment line count (${expected_deselect_count})"
            exit 1
          fi
          for each_deselect_flag in "${deselect_args[@]}"; do
            case "${each_deselect_flag}" in
              *test_fan_out_dispatch.py*)
                echo "known-pending deselect: ${each_deselect_flag}"
                ;;
            esac
          done
          python -m pytest tests/ \
            --basetemp="$RUNNER_TEMP/pytest-basetemp-root" \
            -q \
            -n auto \
            "${deselect_args[@]}"

      - name: Package suite
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/pytest-step-summary-pkg.md
        run: |
          set -euo pipefail
          deselect_args=()
          for list_file in \
            .github/ci/live-post-audit-deselects.txt \
            .github/ci/windows-semantics-node-ids.txt \
            .github/ci/known-pending-deselects.txt \
            .github/ci/author-swap-deselects.txt
          do
            while IFS= read -r node_id || [ -n "${node_id}" ]; do
              node_id="${node_id//$'\r'/}"
              case "${node_id}" in
                ''|\#*) continue ;;
              esac
              deselect_args+=(--deselect="${node_id}")
            done < "${list_file}"
          done
          expected_deselect_count=0
          for list_file in \
            .github/ci/live-post-audit-deselects.txt \
            .github/ci/windows-semantics-node-ids.txt \
            .github/ci/known-pending-deselects.txt \
            .github/ci/author-swap-deselects.txt
          do
            while IFS= read -r node_id || [ -n "${node_id}" ]; do
              node_id="${node_id//$'\r'/}"
              case "${node_id}" in
                ''|\#*) continue ;;
              esac
              expected_deselect_count=$((expected_deselect_count + 1))
            done < "${list_file}"
          done
          deselect_flag_count=${#deselect_args[@]}
          echo "deselect flag count=${deselect_flag_count} expected non-comment lines=${expected_deselect_count}"
          if [ "${deselect_flag_count}" -ne "${expected_deselect_count}" ]; then
            echo "ERROR: deselect_args length (${deselect_flag_count}) != expected non-comment line count (${expected_deselect_count})"
            exit 1
          fi
          for each_deselect_flag in "${deselect_args[@]}"; do
            case "${each_deselect_flag}" in
              *test_fan_out_dispatch.py*)
                echo "known-pending deselect: ${each_deselect_flag}"
                ;;
            esac
          done
          python -m pytest packages/claude-dev-env \
            --basetemp="$RUNNER_TEMP/pytest-basetemp-pkg" \
            -q \
            -n auto \
            "${deselect_args[@]}"

  javascript:
    name: JS suite (ubuntu)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # No npm cache: package has no lockfile (issue #22).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install and run JS tests
        working-directory: packages/claude-dev-env
        run: |
          npm install
          npm test

  quality-gate:
    name: Quality gate (check.ps1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install quality-gate dependencies
        run: |
          pip install -e packages/claude-dev-env/ \
            pytest \
            ruff \
            mypy

      - name: Run check.ps1 with documented deselect set
        shell: pwsh
        run: |
          # CI gate = check.ps1 + tools + documented deselect set.
          # Local check.ps1 without PYTEST_ADDOPTS may run more tests — deliberate.
          $allDeselectListFiles = @(
            '.github/ci/live-post-audit-deselects.txt'
            '.github/ci/windows-semantics-node-ids.txt'
            '.github/ci/known-pending-deselects.txt'
            '.github/ci/author-swap-deselects.txt'
          )
          $allDeselectFlags = [System.Collections.Generic.List[string]]::new()
          $expectedDeselectCount = 0
          foreach ($eachListFile in $allDeselectListFiles) {
            foreach ($eachRawLine in Get-Content -LiteralPath $eachListFile) {
              $eachNodeId = $eachRawLine -replace "`r", ''
              if ([string]::IsNullOrWhiteSpace($eachNodeId)) { continue }
              if ($eachNodeId.StartsWith('#')) { continue }
              $allDeselectFlags.Add("--deselect=$eachNodeId")
              $expectedDeselectCount++
            }
          }
          $deselectFlagCount = $allDeselectFlags.Count
          Write-Host "deselect flag count=$deselectFlagCount expected non-comment lines=$expectedDeselectCount"
          if ($deselectFlagCount -ne $expectedDeselectCount) {
            throw "deselect_args length ($deselectFlagCount) != expected non-comment line count ($expectedDeselectCount)"
          }
          # Full repo-relative node IDs match when check.ps1 runs pytest from
          # hooks/blocking (pytest rootdir is the monorepo root). Do not strip
          # the packages/claude-dev-env/hooks/blocking/ prefix.
          $env:PYTEST_ADDOPTS = ($allDeselectFlags -join ' ')
          Write-Host "PYTEST_ADDOPTS deselect count=$deselectFlagCount"
          $checkOutputLines = & pwsh -File packages/claude-dev-env/scripts/check.ps1 2>&1
          $checkExitCode = $LASTEXITCODE
          $checkOutputLines | ForEach-Object { Write-Host $_ }
          $checkOutputText = ($checkOutputLines | Out-String)
          if ($checkExitCode -ne 0) {
            throw "check.ps1 exited $checkExitCode"
          }
          if ($checkOutputText -notmatch 'CHECK: OK') {
            throw "check.ps1 output missing CHECK: OK"
          }

  windows-semantics:
    name: Windows-semantics micro-suite
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python test dependencies
        run: |
          pip install -e packages/claude-dev-env/ \
            pytest \
            pytest-xdist \
            pyyaml \
            psycopg \
            mypy \
            ruff

      - name: Run windows-semantics node IDs
        shell: pwsh
        run: |
          $windowsSemanticsListPath = '.github/ci/windows-semantics-node-ids.txt'
          $allSelectedNodeIds = [System.Collections.Generic.List[string]]::new()
          $expectedSelectedCount = 0
          foreach ($eachRawLine in Get-Content -LiteralPath $windowsSemanticsListPath) {
            $eachNodeId = $eachRawLine -replace "`r", ''
            if ([string]::IsNullOrWhiteSpace($eachNodeId)) { continue }
            if ($eachNodeId.StartsWith('#')) { continue }
            $allSelectedNodeIds.Add($eachNodeId)
            $expectedSelectedCount++
          }
          $selectedCount = $allSelectedNodeIds.Count
          Write-Host "selected count=$selectedCount expected non-comment lines=$expectedSelectedCount"
          if ($selectedCount -ne $expectedSelectedCount) {
            throw "selected count ($selectedCount) != expected non-comment line count ($expectedSelectedCount)"
          }
          $expectedWindowsSemanticsCount = 7
          if ($selectedCount -ne $expectedWindowsSemanticsCount) {
            throw "selected count ($selectedCount) != expected windows-semantics count ($expectedWindowsSemanticsCount)"
          }
          Write-Host "selected count=$selectedCount"
          & python -m pytest @($allSelectedNodeIds.ToArray()) -q
          if ($LASTEXITCODE -ne 0) {
            throw "windows-semantics pytest exited $LASTEXITCODE"
          }
