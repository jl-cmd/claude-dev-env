# Centralized configuration for hook tooling.
#
# Replaces the standalone hooks/mypy.ini and provides a single config surface
# for mypy, ruff, and pytest invocations rooted under packages/claude-dev-env/hooks/.
# C3 (mypy_integration walk-up) finds this file by walking parents from each
# checked .py file and matching on the [tool.mypy] table.

[tool.mypy]
mypy_path = "."
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = false
warn_redundant_casts = true
no_implicit_optional = true
strict_equality = true
exclude = [
    "validators/test_files/",
    "test_",
    "abbreviation_checks.py",
    "git_checks.py",
    "exempt_paths.py",
    "code_rules_typeddict_stub.py",
]


[[tool.mypy.overrides]]
module = ["exempt_paths", "code_rules_path_utils", "gh_pr_author_enforcer"]
warn_unused_ignores = false

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    ".audit-trail",
    ".claude",
    "node_modules",
    "__pycache__",
    "validators/test_files",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "B",
    "UP",
    "SIM",
    "PL",
]
# Principled + pure-style ignores (#51/#57). Non-negotiable defect classes stay selected.
ignore = [
    "E501",
    "E402",
    "UP038",
    "UP006",
    "UP007",
    "UP015",
    "UP017",
    "UP020",
    "UP024",
    "UP035",
    "UP045",
    "I001",
    "B009",
    "F541",
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR0917",
    "PLR1714",
    "PLR2004",
    "PLR5501",
    "PLC0414",
    "PLC0415",
    "SIM101",
    "SIM102",
    "SIM103",
    "SIM105",
    "SIM109",
    "SIM110",
    "SIM113",
    "SIM114",
    "SIM117",
    "SIM300",
]

[tool.ruff.lint.per-file-ignores]
# Residual production carve-outs re-homed on #57 (gate friction on multi-line touch).
"validators/run_all_validators.py" = ["PLW1510"]
"validators/exempt_paths.py" = ["F401"]
"test_*.py" = ["B011", "PLR2004", "F401", "F841", "PLW1510", "B905", "B033", "SIM115", "B007", "B018", "B904"]
"*_test.py" = ["B011", "PLR2004", "F401", "F841", "PLW1510", "B905", "B033", "SIM115", "B007", "B018", "B904"]
"conftest.py" = ["B011", "F401", "F841", "PLW1510"]

[tool.coverage.run]
branch = true
omit = [
    "test_*.py",
    "*_test.py",
    "conftest.py",
    "__pycache__/*",
    ".audit-trail/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
